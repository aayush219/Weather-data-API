<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Weather Data API</title>
    </head>
    <body>
        <h1>Weather Data API</h1>
        <p>For one station and one date: http://127.0.0.1:5000/api/v1/10/1988-10-25</p>
        <p>For one station and all dates: http://127.0.0.1:5000/api/v1/10</p>
        <p>For one station and particular Year: http://127.0.0.1:5000/api/v1/year/10/1988</p>
        <p>{{data | safe}}</p>
    </body>
</html>
